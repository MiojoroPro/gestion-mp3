server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gestion_mp3}
    username: ${DB_USER:mp3user}
    password: ${DB_PASS:mp3pass}
  jpa:
    hibernate:
      ddl-auto: update          # cree/maj le schema au demarrage (pratique en dev)
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 50MB       # un MP3 peut etre volumineux
      max-request-size: 60MB

# Dossier serveur ou sont stockes les fichiers MP3 (le binaire ; les metadonnees vont en base)
app:
  storage:
    dir: ${STORAGE_DIR:./storage/mp3}
