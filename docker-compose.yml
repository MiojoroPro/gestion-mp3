services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: gestion-mp3-rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # console de gestion (http://localhost:15672 - guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  postgres:
    image: postgres:16-alpine
    container_name: gestion-mp3-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: gestion_mp3
      POSTGRES_USER: mp3user
      POSTGRES_PASSWORD: mp3pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mp3user -d gestion_mp3"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  rabbitmq-data:
  postgres-data:
